version: '3.8'

services:
  landing-app:
    build:
      context: ./landing-app
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./landing-app:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - PUBLIC_URL=/
      - WATCHPACK_POLLING=true
    restart: unless-stopped
    stdin_open: true

  passenger-app:
    build:
      context: ./main-app
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    volumes:
      - ./main-app:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
      - PUBLIC_URL=/
      - WATCHPACK_POLLING=true
    restart: unless-stopped
    stdin_open: true

  rider-app:
    build:
      context: ./rider-app
      dockerfile: Dockerfile.dev
    ports:
      - "3002:3002"
    volumes:
      - ./rider-app:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3002
      - PUBLIC_URL=/
      - WATCHPACK_POLLING=true
    restart: unless-stopped
    stdin_open: true

  dispatcher-app:
    build:
      context: ./dispatcher-app
      dockerfile: Dockerfile.dev
    ports:
      - "3003:3003"
    volumes:
      - ./dispatcher-app:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3003
      - PUBLIC_URL=/
      - WATCHPACK_POLLING=true
    restart: unless-stopped
    stdin_open: true
